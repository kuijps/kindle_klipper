name: Upload DB Artifact

on:
  workflow_dispatch:
    inputs:
      dbfile:
        description: "Upload your DB file"
        required: true
        type: file

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Upload DB
        uses: actions/upload-artifact@v4
        with:
          name: kindle-db
          path: ${{ github.event.inputs.dbfile }}
