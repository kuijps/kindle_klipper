name: Send Daily Kindle Highlight

on:
  schedule:
    - cron: "0 13 * * *"   # runs daily at 13:00 UTC
  workflow_dispatch:        # can be triggered manually

jobs:
  run-highlight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      # Create the /data directory code expects
      - name: Create data directory
        run: mkdir -p data

      # Download  persisted DB artifact into /data
      - name: Download clippings DB
        uses: actions/download-artifact@v4
        with:
          name: kindleclippings-db
          path: data

      #  Run script with DB_PATH pointing to the file in /data
      - name: Run daily highlight
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
          DB_PATH: data/kindle_clippings.db
        run: kk_random

      #  Upload the updated DB back to the artifact store
      - name: Upload updated DB
        uses: actions/upload-artifact@v4
        with:
          name: kindleclippings-db
          path: data/kindle_clippings.db
          overwrite: true
